# NoobBook CI
#
# Required checks:
#   - no-new-legacy-files : structural guardrail that blocks new files under
#                           frozen legacy destinations (see STRUCTURE.md and
#                           docs/tickets/epics/NBB-001.md#nbb-103).
#   - verify-architecture : early root + providers/connectors import-direction
#                           checks from NBB-104 and NBB-206 (see
#                           docs/tickets/epics/NBB-007.md#nbb-704a).
#   - backend-tests       : pytest suite at HEAD (NBB-106/107 extend coverage).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-new-legacy-files:
    name: no-new-legacy-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check no new legacy files
        run: python scripts/ci/check_no_new_legacy_files.py --base "${{ steps.base.outputs.ref }}"

  verify-architecture:
    name: verify-architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify early architecture checks
        run: python backend/scripts/verify_architecture.py

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest
