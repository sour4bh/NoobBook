# NoobBook CI
#
# Required checks:
#   - no-new-legacy-files : structural guardrail that blocks new files under
#                           frozen legacy destinations (see STRUCTURE.md and
#                           docs/tickets/epics/NBB-001.md#nbb-103).
#   - verify-architecture : root + providers/connectors import-direction
#                           checks from NBB-104 and NBB-206, plus post-migration
#                           chat publics-only and independent-roots checks (see
#                           docs/tickets/epics/NBB-007.md#nbb-704a and #nbb-704b).
#   - pyright             : type-check backend/app/ with the checked-in
#                           pyrightconfig.json and pinned pyright@1.1.409 (see
#                           docs/tickets/epics/NBB-007.md#nbb-704c).
#   - verify-project-id-coverage
#                         : AST scan that every claude_service.send_message /
#                           stream_message call passes project_id (NBB-109,
#                           wired in NBB-704C).
#   - verify-no-stateless-singletons
#                         : AST scan that blocks new stateless *Service /
#                           *Executor classes paired with module-level
#                           singletons (see docs/tickets/epics/NBB-007.md#nbb-704c).
#   - backend-tests       : pytest suite at HEAD (NBB-106/107 extend coverage).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-new-legacy-files:
    name: no-new-legacy-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check no new legacy files
        run: python scripts/ci/check_no_new_legacy_files.py --base "${{ steps.base.outputs.ref }}"

  verify-architecture:
    name: verify-architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify architecture checks (NBB-704A + NBB-704B)
        run: python backend/scripts/verify_architecture.py

  pyright:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Run pyright (pinned, NBB-704C)
        run: pnpm dlx pyright@1.1.409 --project pyrightconfig.json

  verify-project-id-coverage:
    name: verify-project-id-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify project_id coverage (NBB-109, wired in NBB-704C)
        run: python backend/scripts/verify_project_id_coverage.py

  verify-no-stateless-singletons:
    name: verify-no-stateless-singletons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify no stateless singletons (NBB-704C)
        run: python backend/scripts/verify_no_stateless_singletons.py

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest
